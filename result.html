<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SBTI 人格测试 — 结果</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <style>
      .page-result {
        background: var(--bg-page);
        min-height: 100vh;
      }

      .page-result .app-shell {
        padding: 20px 16px 40px;
        gap: 16px;
      }

      .result-header {
        text-align: center;
        padding: 8px 0 4px;
      }

      .result-header__title {
        font-size: 17px;
        font-weight: 600;
        color: #333;
        margin: 0;
      }

      .result-header__sub {
        font-size: 12px;
        color: var(--text-light);
        margin: 6px 0 0;
      }

      .card {
        background: var(--bg-card);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        padding: 24px 20px 28px;
        overflow: hidden;
      }

      .card--hero {
        background: linear-gradient(180deg, #f3faf4 0%, #ffffff 55%);
        text-align: center;
      }

      .card--hero .label {
        font-size: 15px;
        font-weight: 600;
        color: #333;
        margin: 0 0 12px;
      }

      .card--hero .name-cn {
        font-size: 26px;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 6px;
        letter-spacing: 0.02em;
      }

      .card--hero .name-code {
        font-size: 28px;
        font-weight: 800;
        color: var(--green-primary);
        margin: 0 0 16px;
        letter-spacing: 0.06em;
      }

      .card--hero .illustration {
        margin: 8px auto 16px;
        max-width: 200px;
      }

      .card--hero .illustration svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .card--hero .pill-wrap {
        margin-bottom: 18px;
      }

      .card--hero .tagline {
        font-family: var(--font-hand);
        font-size: 18px;
        line-height: 1.6;
        color: var(--text-muted);
        margin: 0;
      }

      .category-card {
        position: relative;
        padding-top: 32px;
      }

      .cat-badge {
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        display: inline-block;
        padding: 4px 16px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .cat-badge--love  { background: #fce4ec; color: #ad1457; }
      .cat-badge--value { background: #ede7f6; color: #6a1b9a; }
      .cat-badge--fam   { background: #e8f5e9; color: #2e7d32; }

      .cat-title {
        font-family: var(--font-serif-title);
        font-size: 18px;
        font-weight: 700;
        color: #111;
        margin: 0 0 10px;
        text-align: center;
      }

      .cat-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 14px;
      }

      .cat-tag {
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
      }

      .cat-tag--a { background: #e0f2f1; color: #00695c; }
      .cat-tag--b { background: #ede7f6; color: #6a1b9a; }

      .cat-desc {
        font-family: var(--font-hand);
        font-size: 16px;
        line-height: 1.7;
        color: var(--text-muted);
        margin: 0;
        text-align: left;
      }

      .cat-progress-wrap {
        margin: 12px 0 0;
      }

      .cat-progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-light);
        margin-bottom: 6px;
      }

      .cat-progress {
        height: 8px;
        border-radius: 999px;
        background: #f0f0f0;
        overflow: hidden;
      }

      .cat-progress__fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.6s ease;
      }

      .cat-progress__fill--a { background: linear-gradient(90deg, #26a69a, #4db6ac); }
      .cat-progress__fill--b { background: linear-gradient(90deg, #7b1fa2, #ab47bc); }

      .result-footer-nav {
        text-align: center;
        margin-top: 8px;
        font-size: 13px;
      }

      .result-footer-nav a {
        color: #5c6bc0;
        text-decoration: underline;
        cursor: pointer;
      }

      .no-answer-tip {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-light);
        font-size: 15px;
      }

      .answer-chip {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        margin: 2px;
      }

      .answer-chip--a { background: #e0f2f1; color: #00695c; }
      .answer-chip--b { background: #ede7f6; color: #6a1b9a; }

      .stat-boxes {
        display: flex;
        gap: 12px;
        margin-bottom: 14px;
      }

      .stat-box {
        flex: 1;
        text-align: center;
        padding: 14px 8px;
        border-radius: 14px;
      }

      .stat-box--a { background: #e0f2f1; color: #00695c; }
      .stat-box--b { background: #ede7f6; color: #6a1b9a; }

      .stat-number {
        font-size: 24px;
        font-weight: 700;
      }

      .stat-label {
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body class="page-result">
    <header class="result-header">
      <h1 class="result-header__title">SBTI 人格测试</h1>
      <p class="result-header__sub">测试结果</p>
    </header>
    <div class="app-shell" id="content"></div>

    <script>
      var $ = function(id) { return document.getElementById(id); };

      var QUESTIONS = [
        { id:1,  category:'骚操作', A:'可能在忙，晚点回我',              B:'完了，是不是我说错话了' },
        { id:2,  category:'骚操作', A:'无所谓，反正我自己开心',          B:'删掉，这图配不上我的颜值' },
        { id:3,  category:'骚操作', A:'回个晚安，继续刷剧',              B:'盯着对话框等，想他到底睡了没' },
        { id:4,  category:'骚操作', A:'点个赞表情包，心里记下这名字',     B:'评论区打字又删，删了又打' },
        { id:5,  category:'骚操作', A:'不等了，该干嘛干嘛',               B:'开始后悔是不是不该回那么短' },
        { id:6,  category:'骚操作', A:'疯狂打字发消息，写小作文',         B:'不说话，等对方先道歉' },
        { id:7,  category:'感情观', A:'冷暴力，读完不回',                 B:'翻旧账，吵架拿前任说事' },
        { id:8,  category:'感情观', A:'直接带我去吃好吃的，别墨迹',       B:'慢慢来，先聊一个月再说' },
        { id:9,  category:'感情观', A:'该干嘛干嘛，不当回事',             B:'打开对话框看三遍，想他干嘛去了' },
        { id:10, category:'感情观', A:'当没看见，反正就一个赞',           B:'去翻那女生是谁，到底什么关系' },
        { id:11, category:'感情观', A:'绝对不舔，谁先认真谁输',           B:'遇到对的可以舔，不丢人' },
        { id:12, category:'感情观', A:'拉黑删除清空，快速翻篇',           B:'保留联系方式，偶尔偷看动态' },
        { id:13, category:'日常发疯', A:'看书学习提升自己',              B:'点外卖刷剧躺一天' },
        { id:14, category:'日常发疯', A:'带异性回来过夜还不说',           B:'用你东西不打招呼，用完不还' },
        { id:15, category:'日常发疯', A:'笑着配合，回头再说',             B:'当场黑脸，拉她到一边说' },
        { id:16, category:'日常发疯', A:'不回复，心里拉黑他',             B:'直接怼回去，别惹我' },
        { id:17, category:'日常发疯', A:'怼回去：滚，你才丑',             B:'当她开玩笑，笑着骂一句' },
        { id:18, category:'日常发疯', A:'外表高冷，内心想很多',           B:'纯粹搞笑女，疯疯癫癫的那种' },
      ];

      var LOVE_MAP = {
        A: {
          desc: '恭喜你，你属于情绪稳定、人间清醒型。看到已读不回？无所谓；看到他和别的女生合照？先点个赞再说。你不是不爱，你只是很擅长把自己保护得很好。内心戏偶尔有，但你能快速自我消化，不会让情绪绑架生活。你适合找一个同样独立、有分寸感的人，别找那种需要你 24 小时哄着的，因为你的耐心真的不太够。',
          tags: ['人间清醒', '情绪稳定', '自我消化']
        },
        B: {
          desc: '你是那种典型的嘴硬心软、内心戏超多的类型。一条消息没秒回，你已经把分手剧本写完了；看到他和别人合照，你已经开始查户口了。你不是不优秀，只是容易在感情里变得患得患失。发消息之前会反复编辑，吵架时要么写小作文要么直接冷战。别嫌弃自己——正因为你认真，你才会这样。但学会把注意力分一点给自己，你会更轻松。',
          tags: ['内心戏多', '容易上头', '认真投入']
        }
      };

      var VALUE_MAP = {
        A: {
          desc: '你是一个把感情和生活分得很开的人。分手能快速翻篇，不会在烂人身上浪费太多时间；发朋友圈点赞少？说删就删，不内耗。你的逻辑是：与其纠结别人怎么看，不如专注让自己开心。你不是冷漠，你只是很早就明白——情绪是自己的，与其用来消耗，不如用来好好生活。保持这个状态，但偶尔也允许自己脆弱一下。',
          tags: ['拎得清', '快速翻篇', '专注自己']
        },
        B: {
          desc: '你是那种嘴上说着无所谓，心里已经演了八百集的类型。你对感情认真到有点较真，翻旧账也好、偷看前任动态也好，本质上是因为你真的在乎过。你在关系里容易用力过猛，爱得太满反而让自己疲惫。试着把一部分"在意"分给自己，你会发现世界没有想象中那么需要你去撑场子。',
          tags: ['用力过猛', '爱得太满', '容易上头']
        }
      };

      var FAM_MAP = {
        A: {
          desc: '你是那种在外人眼里"高冷有距离感"的人，其实不是不想社交，是懒得表演。在家看书学习，出门独来独往，群里有阴阳怪气你直接无视。你的内心世界很丰富，不需要靠热闹来填满。适合你的人应该是能欣赏你这种淡然气质的人，而不是总想拉你"活泼一点"的人。当然，偶尔出门social一下也不错，不然真的会和社会脱节。',
          tags: ['独来独往', '高冷淡然', '精神丰富']
        },
        B: {
          desc: '你是那种谁和你待在一起都很开心的人——搞笑、会接梗、气氛担当。在家点外卖刷剧，朋友圈发自拍被闺蜜损然后怼回去，和室友相爱相杀。你是那种活得特别真实的人，不端着，不装。你的世界里没有"尴尬"两个字，吵架就直接吵，吵完该吃吃该喝喝。保持这种状态，开心果本果就是你。',
          tags: ['搞笑担当', '真实不装', '人来疯']
        }
      };

      function getCatResult(answers, indices, typeMap) {
        var aCount = 0;
        for (var i = 0; i < indices.length; i++) {
          if (answers[indices[i]] === 'A') aCount++;
        }
        var total = indices.length;
        var bCount = total - aCount;
        var aPct = Math.round(aCount / total * 100);
        var bPct = 100 - aPct;
        var dominant = aCount > bCount ? 'A' : (aCount < bCount ? 'B' : 'A');
        var traits = typeMap[dominant];
        return { aCount: aCount, bCount: bCount, aPct: aPct, bPct: bPct, dominant: dominant, desc: traits.desc, tags: traits.tags };
      }

      function catCard(badgeCls, badgeTxt, result) {
        var fill = result.dominant === 'A' ? 'a' : 'b';
        var tagHtml = '';
        for (var i = 0; i < result.tags.length; i++) {
          tagHtml += '<span class="cat-tag cat-tag--' + fill + '">' + result.tags[i] + '</span>';
        }
        return '<section class="card category-card" aria-label="' + badgeTxt + '结果">' +
          '<div class="cat-badge ' + badgeCls + '">' + badgeTxt + '</div>' +
          '<h2 class="cat-title">' + (result.dominant === 'A' ? 'A 型倾向' : 'B 型倾向') + '</h2>' +
          '<div class="cat-tags">' + tagHtml + '</div>' +
          '<p class="cat-desc">' + result.desc + '</p>' +
          '<div class="cat-progress-wrap">' +
          '<div class="cat-progress-label">' +
          '<span>A型 ' + result.aPct + '%</span>' +
          '<span>B型 ' + result.bPct + '%</span>' +
          '</div>' +
          '<div class="cat-progress">' +
          '<div class="cat-progress__fill cat-progress__fill--' + fill + '" style="width:' + (result.dominant === 'A' ? result.aPct : result.bPct) + '%"></div>' +
          '</div></div></section>';
      }

      function renderResult(answers) {
        var loveResult  = getCatResult(answers, [0,1,2,3,4,5],   LOVE_MAP);
        var valueResult = getCatResult(answers, [6,7,8,9,10,11], VALUE_MAP);
        var famResult   = getCatResult(answers, [12,13,14,15,16,17], FAM_MAP);

        var aTotal = 0, bTotal = 0;
        for (var i = 0; i < answers.length; i++) {
          if (answers[i] === 'A') aTotal++;
          else bTotal++;
        }
        var bPct = Math.round(bTotal / 18 * 100);
        var tagline = loveResult.dominant === 'B'
          ? '内心戏再多，也别忘了自己才是主角。'
          : '人间清醒归清醒，偶尔发疯也挺可爱。';

        var chipHtml = '';
        for (var j = 0; j < QUESTIONS.length; j++) {
          var ans = answers[j];
          var cls = ans === 'A' ? 'a' : 'b';
          var label = ans === 'A' ? QUESTIONS[j].A.substring(0, 6) + '…' : QUESTIONS[j].B.substring(0, 6) + '…';
          chipHtml += '<span class="answer-chip answer-chip--' + cls + '">Q' + (j+1) + ' ' + (ans === 'A' ? 'A' : 'B') + '</span>';
        }

        $('content').innerHTML = '' +
          '<section class="card card--hero" aria-labelledby="result-type-heading">' +
          '<p class="label" id="result-type-heading">你的人格类型是：</p>' +
          '<p class="name-cn">舔狗</p>' +
          '<p class="name-code">LOVE-D</p>' +
          '<div class="illustration" aria-hidden="true">' +
          '<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">' +
          '<ellipse cx="100" cy="198" rx="72" ry="14" fill="rgba(0,0,0,0.06)"/>' +
          '<polygon points="100,28 138,52 130,108 70,108 62,52" fill="#66bb6a"/>' +
          '<polygon points="62,52 70,108 48,118 40,70" fill="#4caf50"/>' +
          '<polygon points="138,52 130,108 152,118 160,70" fill="#43a047"/>' +
          '<polygon points="70,108 130,108 124,152 76,152" fill="#e53935"/>' +
          '<polygon points="76,152 124,152 118,178 82,178" fill="#c62828"/>' +
          '<polygon points="124,118 152,118 138,145 112,138" fill="#ef5350"/>' +
          '<circle cx="88" cy="88" r="14" fill="#ffcdd2"/>' +
          '<circle cx="112" cy="88" r="14" fill="#ffcdd2"/>' +
          '<path d="M82 84 Q88 78 94 84" fill="none" stroke="#e91e63" stroke-width="3" stroke-linecap="round"/>' +
          '<path d="M106 84 Q112 78 118 84" fill="none" stroke="#e91e63" stroke-width="3" stroke-linecap="round"/>' +
          '<path d="M94 108 Q100 114 106 108" fill="none" stroke="#b71c1c" stroke-width="2" stroke-linecap="round"/>' +
          '</svg></div>' +
          '<div class="pill-wrap"><span class="pill-tag">已清屏</span></div>' +
          '<p class="tagline">' + tagline + '</p>' +
          '</section>' +

          catCard('cat-badge--love',  '骚操作',     loveResult) +
          catCard('cat-badge--value', '感情观',     valueResult) +
          catCard('cat-badge--fam',   '日常发疯',   famResult) +

          '<section class="card">' +
          '<h2 class="cat-title" style="font-size:18px;margin:0 0 14px;">答题记录</h2>' +
          '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;">' + chipHtml + '</div>' +
          '<div class="stat-boxes">' +
          '<div class="stat-box stat-box--a">' +
          '<div class="stat-number">' + aTotal + '</div>' +
          '<div class="stat-label">A 型作答</div></div>' +
          '<div class="stat-box stat-box--b">' +
          '<div class="stat-number">' + bTotal + '</div>' +
          '<div class="stat-label">B 型作答</div></div></div>' +
          '<p style="margin:0;font-size:14px;color:var(--text-muted);text-align:center;">' +
          '共 18 题 · 她更偏向 <strong style="color:var(--green-primary)">' + (bPct >= 50 ? 'B 型' : 'A 型') + '</strong> 取向（' + bPct + '%）</p>' +
          '</section>' +

          '<p class="result-footer-nav"><a onclick="restart()">重新测试</a></p>';
      }

      function restart() {
        localStorage.removeItem('mbti_answers');
        localStorage.removeItem('mbti_done');
        window.location.href = 'question.html';
      }

      var raw = localStorage.getItem('mbti_answers');
      if (!raw) {
        $('content').innerHTML = '<div class="no-answer-tip">暂无答题记录，<a href="question.html" style="color:#5c6bc0;text-decoration:underline">前往测试</a></div>';
      } else {
        renderResult(JSON.parse(raw));
      }
    </script>
  </body>
</html>
