<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SBTI 人格测试 — 结果</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <style>
      .page-result {
        background: var(--bg-page);
        min-height: 100vh;
      }

      .page-result .app-shell {
        padding: 20px 16px 40px;
        gap: 16px;
      }

      .result-header {
        text-align: center;
        padding: 8px 0 4px;
      }

      .result-header__title {
        font-size: 17px;
        font-weight: 600;
        color: #333;
        margin: 0;
      }

      .result-header__sub {
        font-size: 12px;
        color: var(--text-light);
        margin: 6px 0 0;
      }

      .card {
        background: var(--bg-card);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        padding: 24px 20px 28px;
        overflow: hidden;
      }

      .card--hero {
        background: linear-gradient(180deg, #f3faf4 0%, #ffffff 55%);
        text-align: center;
      }

      .card--hero .label {
        font-size: 15px;
        font-weight: 600;
        color: #333;
        margin: 0 0 12px;
      }

      .card--hero .name-cn {
        font-size: 26px;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 6px;
        letter-spacing: 0.02em;
      }

      .card--hero .name-code {
        font-size: 28px;
        font-weight: 800;
        color: var(--green-primary);
        margin: 0 0 16px;
        letter-spacing: 0.06em;
      }

      .card--hero .illustration {
        margin: 8px auto 16px;
        max-width: 200px;
      }

      .card--hero .illustration svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .card--hero .pill-wrap {
        margin-bottom: 18px;
      }

      .card--hero .tagline {
        font-family: var(--font-hand);
        font-size: 18px;
        line-height: 1.6;
        color: var(--text-muted);
        margin: 0;
      }

      .category-card {
        position: relative;
        padding-top: 32px;
      }

      .cat-badge {
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        display: inline-block;
        padding: 4px 16px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .cat-badge--love  { background: #fce4ec; color: #ad1457; }
      .cat-badge--value { background: #ede7f6; color: #6a1b9a; }
      .cat-badge--fam   { background: #e8f5e9; color: #2e7d32; }

      .cat-title {
        font-family: var(--font-serif-title);
        font-size: 18px;
        font-weight: 700;
        color: #111;
        margin: 0 0 10px;
        text-align: center;
      }

      .cat-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 14px;
      }

      .cat-tag {
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
      }

      .cat-tag--a { background: #e0f2f1; color: #00695c; }
      .cat-tag--b { background: #ede7f6; color: #6a1b9a; }

      .cat-desc {
        font-family: var(--font-hand);
        font-size: 16px;
        line-height: 1.7;
        color: var(--text-muted);
        margin: 0;
        text-align: left;
      }

      .cat-progress-wrap {
        margin: 12px 0 0;
      }

      .cat-progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-light);
        margin-bottom: 6px;
      }

      .cat-progress {
        height: 8px;
        border-radius: 999px;
        background: #f0f0f0;
        overflow: hidden;
      }

      .cat-progress__fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.6s ease;
      }

      .cat-progress__fill--a { background: linear-gradient(90deg, #26a69a, #4db6ac); }
      .cat-progress__fill--b { background: linear-gradient(90deg, #7b1fa2, #ab47bc); }

      .result-footer-nav {
        text-align: center;
        margin-top: 8px;
        font-size: 13px;
      }

      .result-footer-nav a {
        color: #5c6bc0;
        text-decoration: underline;
        cursor: pointer;
      }

      .no-answer-tip {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-light);
        font-size: 15px;
      }

      .answer-chip {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        margin: 2px;
      }

      .answer-chip--a { background: #e0f2f1; color: #00695c; }
      .answer-chip--b { background: #ede7f6; color: #6a1b9a; }

      .stat-boxes {
        display: flex;
        gap: 12px;
        margin-bottom: 14px;
      }

      .stat-box {
        flex: 1;
        text-align: center;
        padding: 14px 8px;
        border-radius: 14px;
      }

      .stat-box--a { background: #e0f2f1; color: #00695c; }
      .stat-box--b { background: #ede7f6; color: #6a1b9a; }

      .stat-number {
        font-size: 24px;
        font-weight: 700;
      }

      .stat-label {
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body class="page-result">
    <header class="result-header">
      <h1 class="result-header__title">SBTI 人格测试</h1>
      <p class="result-header__sub">测试结果</p>
    </header>
    <div class="app-shell" id="content"></div>

    <script>
      var $ = function(id) { return document.getElementById(id); };

      var QUESTIONS = [
        { id:1,  category:'爱情观', A:'选爱情，感情最重要',         B:'选事业，钱才是真的' },
        { id:2,  category:'爱情观', A:'有10元给我9元的',            B:'有100万给我10万的' },
        { id:3,  category:'爱情观', A:'先找爱我的，再追求两情相悦',  B:'我爱的人，否则没意义' },
        { id:4,  category:'爱情观', A:'有男朋友的，只有一个竞争对手',B:'单身的，选择更多' },
        { id:5,  category:'爱情观', A:'先找到女朋友后再专一',        B:'找的时候就要专一' },
        { id:6,  category:'爱情观', A:'钱是给女人看的，不是给女人花的',B:'真诚才是必杀技' },
        { id:7,  category:'爱情观', A:'心中无女人，保持清醒',        B:'身边没女人，行动上也没有' },
        { id:8,  category:'爱情观', A:'好女孩不辜负，坏女孩不浪费',  B:'一视同仁，真心对待每个人' },
        { id:9,  category:'爱情观', A:'日久生情，相处后才真实',      B:'一见钟情，感觉对了就冲' },
        { id:10, category:'爱情观', A:'发誓可以，发朋友圈不行',      B:'大大方方，爱就公开' },
      ];

      var CAT_MAP = {
        A: {
          desc: '你的恋爱观偏理性务实，和童锦程这套打法高度契合。你心里门清：钱是底气，先谋生再谋爱；感情里不玩虚的，要的是实际付出和清醒的脑子。你不太会被甜言蜜语冲昏头，恋爱也好分手也好，都能拎得清。你的优势是：不容易受伤，因为早就不把期待放在别人身上。建议：继续保持清醒，但偶尔允许自己冲动一次，不然真的会活得很累。',
          tags: ['人间清醒', '务实派', '感情拎得清']
        },
        B: {
          desc: '你的恋爱观偏感性浪漫，和童锦程这套完全不是一个路数。你相信感觉、相信爱情本身、相信真心能换真心。选你爱的人而不是爱你的？没问题，你就是要奔着心动去。这种人最大的风险是：容易恋爱脑，容易被套路骗，容易在一段烂感情里耗太久。建议：保持你的真心，但给它装一个止损线，不然到最后伤得最深的还是你自己。',
          tags: ['恋爱脑', '感觉派', '真心换真心']
        }
      };

      function getResult(answers) {
        var aCount = 0;
        for (var i = 0; i < answers.length; i++) {
          if (answers[i] === 'A') aCount++;
        }
        var total = answers.length;
        var bCount = total - aCount;
        var aPct = Math.round(aCount / total * 100);
        var bPct = 100 - aPct;
        var dominant = aCount > bCount ? 'A' : (aCount < bCount ? 'B' : 'A');
        var traits = CAT_MAP[dominant];
        return { aCount: aCount, bCount: bCount, aPct: aPct, bPct: bPct, dominant: dominant, desc: traits.desc, tags: traits.tags };
      }

      function buildCard(result) {
        var fill = result.dominant === 'A' ? 'a' : 'b';
        var tagHtml = '';
        for (var i = 0; i < result.tags.length; i++) {
          tagHtml += '<span class="cat-tag cat-tag--' + fill + '">' + result.tags[i] + '</span>';
        }
        return '' +
          '<section class="card card--hero" aria-labelledby="result-type-heading">' +
          '<p class="label" id="result-type-heading">你的人格类型是：</p>' +
          '<p class="name-cn">' + (result.dominant === 'A' ? '人间清醒' : '纯爱战士') + '</p>' +
          '<p class="name-code">' + (result.dominant === 'A' ? 'LOVE-X' : 'LOVE-M') + '</p>' +
          '<div class="illustration" aria-hidden="true">' +
          '<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">' +
          '<ellipse cx="100" cy="198" rx="72" ry="14" fill="rgba(0,0,0,0.06)"/>' +
          '<polygon points="100,28 138,52 130,108 70,108 62,52" fill="#66bb6a"/>' +
          '<polygon points="62,52 70,108 48,118 40,70" fill="#4caf50"/>' +
          '<polygon points="138,52 130,108 152,118 160,70" fill="#43a047"/>' +
          '<polygon points="70,108 130,108 124,152 76,152" fill="#e53935"/>' +
          '<polygon points="76,152 124,152 118,178 82,178" fill="#c62828"/>' +
          '<polygon points="124,118 152,118 138,145 112,138" fill="#ef5350"/>' +
          '<circle cx="88" cy="88" r="14" fill="#ffcdd2"/>' +
          '<circle cx="112" cy="88" r="14" fill="#ffcdd2"/>' +
          '<path d="M82 84 Q88 78 94 84" fill="none" stroke="#e91e63" stroke-width="3" stroke-linecap="round"/>' +
          '<path d="M106 84 Q112 78 118 84" fill="none" stroke="#e91e63" stroke-width="3" stroke-linecap="round"/>' +
          '<path d="M94 108 Q100 114 106 108" fill="none" stroke="#b71c1c" stroke-width="2" stroke-linecap="round"/>' +
          '</svg></div>' +
          '<div class="pill-wrap"><span class="pill-tag">' + (result.dominant === 'A' ? '童锦程附体' : '真心大于套路') + '</span></div>' +
          '<p class="tagline">' + result.desc.split('。')[0] + '。</p>' +
          '</section>' +

          '<section class="card">' +
          '<h2 class="cat-title">' + (result.dominant === 'A' ? 'A 型 · 务实派' : 'B 型 · 浪漫派') + '</h2>' +
          '<div class="cat-tags">' + tagHtml + '</div>' +
          '<p class="cat-desc">' + result.desc + '</p>' +
          '<div class="cat-progress-wrap">' +
          '<div class="cat-progress-label">' +
          '<span>A型 ' + result.aPct + '%</span>' +
          '<span>B型 ' + result.bPct + '%</span>' +
          '</div>' +
          '<div class="cat-progress">' +
          '<div class="cat-progress__fill cat-progress__fill--' + fill + '" style="width:' + (result.dominant === 'A' ? result.aPct : result.bPct) + '%"></div>' +
          '</div></div></section>' +

          '<section class="card">' +
          '<h2 class="cat-title" style="font-size:18px;margin:0 0 14px;">答题记录</h2>' +
          '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;">';
      }

      function renderResult(answers) {
        var result = getResult(answers);

        var chipHtml = '';
        for (var j = 0; j < QUESTIONS.length; j++) {
          var ans = answers[j];
          var cls = ans === 'A' ? 'a' : 'b';
          chipHtml += '<span class="answer-chip answer-chip--' + cls + '">Q' + (j+1) + ' ' + (ans === 'A' ? 'A' : 'B') + '</span>';
        }

        $('content').innerHTML = buildCard(result) + chipHtml + '' +
          '</div>' +
          '<div class="stat-boxes">' +
          '<div class="stat-box stat-box--a">' +
          '<div class="stat-number">' + result.aCount + '</div>' +
          '<div class="stat-label">A 型作答</div></div>' +
          '<div class="stat-box stat-box--b">' +
          '<div class="stat-number">' + result.bCount + '</div>' +
          '<div class="stat-label">B 型作答</div></div></div>' +
          '<p style="margin:0;font-size:14px;color:var(--text-muted);text-align:center;">' +
          '共 ' + answers.length + ' 题 · 你是 <strong style="color:var(--green-primary)">' + (result.dominant === 'A' ? '务实派' : '浪漫派') + '</strong></p>' +
          '</section>' +

          '<p class="result-footer-nav"><a onclick="restart()">重新测试</a></p>';
      }

      function restart() {
        localStorage.removeItem('mbti_answers');
        localStorage.removeItem('mbti_done');
        window.location.href = 'question.html';
      }

      var raw = localStorage.getItem('mbti_answers');
      if (!raw) {
        $('content').innerHTML = '<div class="no-answer-tip">暂无答题记录，<a href="question.html" style="color:#5c6bc0;text-decoration:underline">前往测试</a></div>';
      } else {
        renderResult(JSON.parse(raw));
      }
    </script>
  </body>
</html>
