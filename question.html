<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MBTI性格测试</title>
    <link rel="stylesheet" href="css/common.css" />
    <style>
      .page-question {
        background: linear-gradient(165deg, #e8e4f0 0%, #f0ecf5 40%, #e3eaf5 100%);
        min-height: 100vh;
      }

      .page-question .app-shell {
        justify-content: center;
        padding: 24px 16px 32px;
      }

      .card-question {
        background: var(--bg-card);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        padding: 28px 22px 36px;
        position: relative;
      }

      .card-question__title {
        text-align: center;
        font-size: 17px;
        font-weight: 600;
        color: #333;
        margin: 0 0 18px;
      }

      .progress {
        height: 6px;
        border-radius: 999px;
        background: #e8ecf0;
        overflow: hidden;
        margin-bottom: 24px;
      }

      .progress__bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #9ec5e8, #b8d4ef);
        transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .category-tag {
        display: inline-block;
        font-size: 12px;
        border-radius: 999px;
        padding: 3px 12px;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .card-question__q {
        font-size: 16px;
        line-height: 1.55;
        color: #222;
        margin: 0 0 22px;
        text-align: left;
      }

      .btn-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn-choice {
        width: 100%;
        padding: 16px 20px;
        border-radius: var(--radius-btn);
        font-size: 16px;
        font-weight: 500;
        transition: transform 0.12s ease, background 0.15s ease, color 0.15s ease;
        border: 2px solid transparent;
        text-align: left;
      }

      .btn-choice:active {
        transform: scale(0.97);
      }

      .btn-choice--a {
        background: #e0f2f1;
        color: #00695c;
      }

      .btn-choice--a.selected {
        background: #00695c;
        color: #fff;
        border-color: #004d40;
      }

      .btn-choice--b {
        background: #ede7f6;
        color: #6a1b9a;
      }

      .btn-choice--b.selected {
        background: #6a1b9a;
        color: #fff;
        border-color: #4a148c;
      }

      .btn-prev {
        margin-top: 8px;
        width: 100%;
        padding: 14px 20px;
        border-radius: var(--radius-btn);
        font-size: 15px;
        color: #555;
        background: #f3f4f6;
        transition: background 0.15s, opacity 0.15s;
      }

      .btn-prev:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .btn-submit {
        margin-top: 8px;
        width: 100%;
        padding: 14px 20px;
        border-radius: var(--radius-btn);
        font-size: 15px;
        color: #fff;
        background: var(--green-primary);
        display: none;
      }

      .btn-submit:active {
        transform: scale(0.97);
      }

      .card-question__pill-wrap {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      .dots {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #d0d5dd;
        transition: background 0.2s;
      }

      .dot.answered {
        background: var(--green-primary);
      }

      .dot.current {
        background: #5c9bd6;
        transform: scale(1.3);
      }

      .question-counter {
        text-align: center;
        font-size: 12px;
        color: var(--text-light);
        margin-top: 10px;
      }
    </style>
  </head>
  <body class="page-question">
    <div class="app-shell">
      <main class="card-question" aria-label="答题区域">
        <h1 class="card-question__title">MBTI性格测试</h1>
        <div class="progress" role="progressbar" aria-label="答题进度">
          <div class="progress__bar" id="progressBar"></div>
        </div>
        <div class="category-tag" id="categoryTag"></div>
        <p class="card-question__q" id="questionText"></p>
        <div class="btn-stack">
          <button type="button" class="btn-choice btn-choice--a" id="btnA"></button>
          <button type="button" class="btn-choice btn-choice--b" id="btnB"></button>
          <button type="button" class="btn-prev" id="btnPrev" disabled>上一题</button>
          <button type="button" class="btn-submit" id="btnSubmit">查看结果</button>
        </div>
        <div class="dots" id="dotsContainer"></div>
        <div class="question-counter" id="questionCounter"></div>
       
      </main>
    </div>

    <script>
      /* ─────────────── 题目数据 ─────────────── */
      const QUESTIONS = [
        {
          id: 1, category: '爱情观',
          text: '1. 爱情 vs 事业：你选哪个？',
          A: '选爱情，感情最重要', B: '选事业，钱才是真的'
        },
        {
          id: 2, category: '爱情观',
          text: '2. 有 10 元给你 9 元 vs 有 100 万给你 10 万：恋爱你选哪个？',
          A: '有10元给我9元的', B: '有100万给我10万的'
        },
        {
          id: 3, category: '爱情观',
          text: '3. 爱你的人 vs 你爱的人：你选哪个？',
          A: '先找爱我的，再追求两情相悦', B: '我爱的人，否则没意义'
        },
        {
          id: 4, category: '爱情观',
          text: '4. 有男朋友的女生 vs 单身女生：哪个更好追？',
          A: '有男朋友的，只有一个竞争对手', B: '单身的，选择更多'
        },
        {
          id: 5, category: '爱情观',
          text: '5. 专一找女朋友 vs 找到后再专一：你选哪种方式？',
          A: '先找到女朋友后再专一', B: '找的时候就要专一'
        },
        {
          id: 6, category: '爱情观',
          text: '6. 金钱买爱情 vs 真诚换爱情：你选哪种？',
          A: '钱是给女人看的，不是给女人花的', B: '真诚才是必杀技'
        },
        {
          id: 7, category: '爱情观',
          text: '7. 心中无女人 vs 身边没女人：你选哪个？',
          A: '心中无女人，保持清醒', B: '身边没女人，行动上也没有'
        },
        {
          id: 8, category: '爱情观',
          text: '8. 好女孩 vs 坏女孩：你怎么对待？',
          A: '好女孩不辜负，坏女孩不浪费', B: '一视同仁，真心对待每个人'
        },
        {
          id: 9, category: '爱情观',
          text: '9. 一见钟情 vs 日久生情：你更相信哪个？',
          A: '日久生情，相处后才真实', B: '一见钟情，感觉对了就冲'
        },
        {
          id: 10, category: '爱情观',
          text: '10. 公开恋情 vs 私下恋爱：你选哪种？',
          A: '发誓可以，发朋友圈不行', B: '大大方方，爱就公开'
        },
      ];

      /* ─────────────── 状态 ─────────────── */
      const TOTAL   = QUESTIONS.length;
      const answers = new Array(TOTAL).fill(null); // null | 'A' | 'B'
      let cur = 0;

      /* ─────────────── DOM ─────────────── */
      const $ = id => document.getElementById(id);
      const progressBar   = $('progressBar');
      const categoryTag   = $('categoryTag');
      const questionText  = $('questionText');
      const btnA          = $('btnA');
      const btnB          = $('btnB');
      const btnPrev       = $('btnPrev');
      const btnSubmit     = $('btnSubmit');
      const dotsContainer = $('dotsContainer');
      const questionCounter = $('questionCounter');

      /* ─────────────── 渲染进度点 ─────────────── */
      function buildDots() {
        dotsContainer.innerHTML = '';
        QUESTIONS.forEach((_, i) => {
          const d = document.createElement('div');
          d.className = 'dot';
          dotsContainer.appendChild(d);
        });
      }

      function refreshDots() {
        const dots = dotsContainer.querySelectorAll('.dot');
        dots.forEach((d, i) => {
          d.className = 'dot';
          if (answers[i] !== null) d.classList.add('answered');
          if (i === cur)            d.classList.add('current');
        });
      }

      /* ─────────────── 渲染当前题目 ─────────────── */
      function render() {
        const pct = Math.round(((cur + 1) / TOTAL) * 100);
        progressBar.style.width = pct + '%';

        const q = QUESTIONS[cur];
        questionText.textContent = q.text;
        btnA.textContent = q.A;
        btnB.textContent = q.B;

        // 分类标签颜色（统一爱情观风格）
        categoryTag.style.background = '#fce4ec';
        categoryTag.style.color = '#ad1457';
        categoryTag.textContent = '爱情观';

        // 选中高亮
        btnA.classList.toggle('selected', answers[cur] === 'A');
        btnB.classList.toggle('selected', answers[cur] === 'B');

        btnPrev.disabled = cur === 0;

        // 最后一题且已作答 → 显示提交按钮
        btnSubmit.style.display = (cur === TOTAL - 1 && answers[cur] !== null) ? 'block' : 'none';

        questionCounter.textContent = `${cur + 1} / ${TOTAL}`;
        refreshDots();
      }

      /* ─────────────── 选择答案 ─────────────── */
      function pick(value) {
        answers[cur] = value;
        render();
        if (cur < TOTAL - 1) {
          cur++;
          render();
        }
      }

      /* ─────────────── 事件绑定 ─────────────── */
      btnA.addEventListener('click', () => pick('A'));
      btnB.addEventListener('click', () => pick('B'));
      btnPrev.addEventListener('click', () => {
        if (cur > 0) { cur--; render(); }
      });
      btnSubmit.addEventListener('click', () => {
        localStorage.setItem('mbti_answers', JSON.stringify(answers));
        window.location.href = 'result.html';
      });

      /* ─────────────── 启动 ─────────────── */
      localStorage.removeItem('mbti_answers');
      localStorage.removeItem('mbti_done');

      buildDots();
      render();
    </script>
  </body>
</html>
