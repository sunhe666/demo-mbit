<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MBTI性格测试</title>
    <link rel="stylesheet" href="css/common.css" />
    <style>
      .page-question {
        background: linear-gradient(165deg, #e8e4f0 0%, #f0ecf5 40%, #e3eaf5 100%);
        min-height: 100vh;
      }

      .page-question .app-shell {
        justify-content: center;
        padding: 24px 16px 32px;
      }

      .card-question {
        background: var(--bg-card);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        padding: 28px 22px 36px;
        position: relative;
      }

      .card-question__title {
        text-align: center;
        font-size: 17px;
        font-weight: 600;
        color: #333;
        margin: 0 0 18px;
      }

      .progress {
        height: 6px;
        border-radius: 999px;
        background: #e8ecf0;
        overflow: hidden;
        margin-bottom: 24px;
      }

      .progress__bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #9ec5e8, #b8d4ef);
        transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .category-tag {
        display: inline-block;
        font-size: 12px;
        border-radius: 999px;
        padding: 3px 12px;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .card-question__q {
        font-size: 16px;
        line-height: 1.55;
        color: #222;
        margin: 0 0 22px;
        text-align: left;
      }

      .btn-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn-choice {
        width: 100%;
        padding: 16px 20px;
        border-radius: var(--radius-btn);
        font-size: 16px;
        font-weight: 500;
        transition: transform 0.12s ease, background 0.15s ease, color 0.15s ease;
        border: 2px solid transparent;
        text-align: left;
      }

      .btn-choice:active {
        transform: scale(0.97);
      }

      .btn-choice--a {
        background: #e0f2f1;
        color: #00695c;
      }

      .btn-choice--a.selected {
        background: #00695c;
        color: #fff;
        border-color: #004d40;
      }

      .btn-choice--b {
        background: #ede7f6;
        color: #6a1b9a;
      }

      .btn-choice--b.selected {
        background: #6a1b9a;
        color: #fff;
        border-color: #4a148c;
      }

      .btn-prev {
        margin-top: 8px;
        width: 100%;
        padding: 14px 20px;
        border-radius: var(--radius-btn);
        font-size: 15px;
        color: #555;
        background: #f3f4f6;
        transition: background 0.15s, opacity 0.15s;
      }

      .btn-prev:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .btn-submit {
        margin-top: 8px;
        width: 100%;
        padding: 14px 20px;
        border-radius: var(--radius-btn);
        font-size: 15px;
        color: #fff;
        background: var(--green-primary);
        display: none;
      }

      .btn-submit:active {
        transform: scale(0.97);
      }

      .card-question__pill-wrap {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      .dots {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #d0d5dd;
        transition: background 0.2s;
      }

      .dot.answered {
        background: var(--green-primary);
      }

      .dot.current {
        background: #5c9bd6;
        transform: scale(1.3);
      }

      .question-counter {
        text-align: center;
        font-size: 12px;
        color: var(--text-light);
        margin-top: 10px;
      }
    </style>
  </head>
  <body class="page-question">
    <div class="app-shell">
      <main class="card-question" aria-label="答题区域">
        <h1 class="card-question__title">MBTI性格测试</h1>
        <div class="progress" role="progressbar" aria-label="答题进度">
          <div class="progress__bar" id="progressBar"></div>
        </div>
        <div class="category-tag" id="categoryTag"></div>
        <p class="card-question__q" id="questionText"></p>
        <div class="btn-stack">
          <button type="button" class="btn-choice btn-choice--a" id="btnA"></button>
          <button type="button" class="btn-choice btn-choice--b" id="btnB"></button>
          <button type="button" class="btn-prev" id="btnPrev" disabled>上一题</button>
          <button type="button" class="btn-submit" id="btnSubmit">查看结果</button>
        </div>
        <div class="dots" id="dotsContainer"></div>
        <div class="question-counter" id="questionCounter"></div>
       
      </main>
    </div>

    <script>
      /* ─────────────── 题目数据 ─────────────── */
      const QUESTIONS = [
        // ── 骚操作 ──
        {
          id: 1, category: '骚操作',
          text: '1. 他已读不回，你脑子里第一反应是？',
          A: '可能在忙，晚点回我', B: '完了，是不是我说错话了'
        },
        {
          id: 2, category: '骚操作',
          text: '2. 你发了一条超精心修图的朋友圈，结果点赞数只有 3 个，你会？',
          A: '无所谓，反正我自己开心', B: '删掉，这图配不上我的颜值'
        },
        {
          id: 3, category: '骚操作',
          text: '3. 和暧昧对象聊天到深夜，他说"困了先睡了"，你会？',
          A: '回个晚安，继续刷剧', B: '盯着对话框等，想他到底睡了没'
        },
        {
          id: 4, category: '骚操作',
          text: '4. 他发了个朋友圈，和一个你不认识的异性的合照，你会？',
          A: '点个赞表情包，心里记下这名字', B: '评论区打字又删，删了又打'
        },
        {
          id: 5, category: '骚操作',
          text: '5. 他主动找你说了一句话，你回完之后等了很久没下文，你会？',
          A: '不等了，该干嘛干嘛', B: '开始后悔是不是不该回那么短'
        },
        {
          id: 6, category: '骚操作',
          text: '6. 吵架的时候，你最常做的事是？',
          A: '疯狂打字发消息，写小作文', B: '不说话，等对方先道歉'
        },
        // ── 感情观 ──
        {
          id: 7, category: '感情观',
          text: '7. 你觉得恋爱里最不能忍的是什么？',
          A: '冷暴力，读完不回', B: '翻旧账，吵架拿前任说事'
        },
        {
          id: 8, category: '感情观',
          text: '8. 你更喜欢什么样的追求方式？',
          A: '直接带我去吃好吃的，别墨迹', B: '慢慢来，先聊一个月再说'
        },
        {
          id: 9, category: '感情观',
          text: '9. 对方没有秒回你消息时，你会？',
          A: '该干嘛干嘛，不当回事', B: '打开对话框看三遍，想他干嘛去了'
        },
        {
          id: 10, category: '感情观',
          text: '10. 如果你发现男朋友给别的女生朋友圈点赞了，你会？',
          A: '当没看见，反正就一个赞', B: '去翻那女生是谁，到底什么关系'
        },
        {
          id: 11, category: '感情观',
          text: '11. 你觉得"舔"这个字对你来说？',
          A: '绝对不舔，谁先认真谁输', B: '遇到对的可以舔，不丢人'
        },
        {
          id: 12, category: '感情观',
          text: '12. 分手之后，你会？',
          A: '拉黑删除清空，快速翻篇', B: '保留联系方式，偶尔偷看动态'
        },
        // ── 日常发疯 ──
        {
          id: 13, category: '日常发疯',
          text: '13. 周末你一个人在家，你通常会？',
          A: '看书学习提升自己', B: '点外卖刷剧躺一天'
        },
        {
          id: 14, category: '日常发疯',
          text: '14. 你最受不了哪种室友？',
          A: '带异性回来过夜还不说', B: '用你东西不打招呼，用完不还'
        },
        {
          id: 15, category: '日常发疯',
          text: '15. 你妈在亲戚面前说你的黑历史，你会？',
          A: '笑着配合，回头再说', B: '当场黑脸，拉她到一边说'
        },
        {
          id: 16, category: '日常发疯',
          text: '16. 在群里有人阴阳怪气你，你通常怎么应对？',
          A: '不回复，心里拉黑他', B: '直接怼回去，别惹我'
        },
        {
          id: 17, category: '日常发疯',
          text: '17. 你在朋友圈发自拍，闺蜜评论区说"丑死了"，你会？',
          A: '怼回去：滚，你才丑', B: '当她开玩笑，笑着骂一句'
        },
        {
          id: 18, category: '日常发疯',
          text: '18. 你觉得自己本质上是个？',
          A: '外表高冷，内心想很多', B: '纯粹搞笑女，疯疯癫癫的那种'
        },
      ];

      /* ─────────────── 状态 ─────────────── */
      const TOTAL   = QUESTIONS.length;
      const answers = new Array(TOTAL).fill(null); // null | 'A' | 'B'
      let cur = 0;

      /* ─────────────── DOM ─────────────── */
      const $ = id => document.getElementById(id);
      const progressBar   = $('progressBar');
      const categoryTag   = $('categoryTag');
      const questionText  = $('questionText');
      const btnA          = $('btnA');
      const btnB          = $('btnB');
      const btnPrev       = $('btnPrev');
      const btnSubmit     = $('btnSubmit');
      const dotsContainer = $('dotsContainer');
      const questionCounter = $('questionCounter');

      /* ─────────────── 渲染进度点 ─────────────── */
      function buildDots() {
        dotsContainer.innerHTML = '';
        QUESTIONS.forEach((_, i) => {
          const d = document.createElement('div');
          d.className = 'dot';
          dotsContainer.appendChild(d);
        });
      }

      function refreshDots() {
        const dots = dotsContainer.querySelectorAll('.dot');
        dots.forEach((d, i) => {
          d.className = 'dot';
          if (answers[i] !== null) d.classList.add('answered');
          if (i === cur)            d.classList.add('current');
        });
      }

      /* ─────────────── 渲染当前题目 ─────────────── */
      function render() {
        const pct = Math.round(((cur + 1) / TOTAL) * 100);
        progressBar.style.width = pct + '%';

        const q = QUESTIONS[cur];
        questionText.textContent = q.text;
        btnA.textContent = q.A;
        btnB.textContent = q.B;

        // 分类标签颜色
        var catColorMap = {
          '骚操作':  { bg: '#fce4ec', color: '#ad1457' },
          '感情观':  { bg: '#ede7f6', color: '#6a1b9a' },
          '日常发疯':{ bg: '#e8f5e9', color: '#2e7d32' }
        };
        var catStyle = catColorMap[q.category] || { bg: '#9c7ec8', color: '#fff' };
        categoryTag.textContent = q.category;
        categoryTag.style.background = catStyle.bg;
        categoryTag.style.color = catStyle.color;

        // 选中高亮
        btnA.classList.toggle('selected', answers[cur] === 'A');
        btnB.classList.toggle('selected', answers[cur] === 'B');

        btnPrev.disabled = cur === 0;

        // 最后一题且已作答 → 显示提交按钮
        btnSubmit.style.display = (cur === TOTAL - 1 && answers[cur] !== null) ? 'block' : 'none';

        questionCounter.textContent = `${cur + 1} / ${TOTAL}`;
        refreshDots();
      }

      /* ─────────────── 选择答案 ─────────────── */
      function pick(value) {
        answers[cur] = value;
        render();
        if (cur < TOTAL - 1) {
          cur++;
          render();
        }
      }

      /* ─────────────── 事件绑定 ─────────────── */
      btnA.addEventListener('click', () => pick('A'));
      btnB.addEventListener('click', () => pick('B'));
      btnPrev.addEventListener('click', () => {
        if (cur > 0) { cur--; render(); }
      });
      btnSubmit.addEventListener('click', () => {
        localStorage.setItem('mbti_answers', JSON.stringify(answers));
        window.location.href = 'result.html';
      });

      /* ─────────────── 启动 ─────────────── */
      localStorage.removeItem('mbti_answers');
      localStorage.removeItem('mbti_done');

      buildDots();
      render();
    </script>
  </body>
</html>
